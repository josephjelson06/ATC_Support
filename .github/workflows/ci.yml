name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: atc_support_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d atc_support_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/atc_support_test?schema=public
      JWT_SECRET: ci_jwt_secret_atc_support_1234567890
      CORS_ORIGIN: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ATC_Support_Backend/package-lock.json

      - name: Install
        working-directory: ATC_Support_Backend
        run: npm ci

      - name: Typecheck
        working-directory: ATC_Support_Backend
        run: npm run typecheck

      - name: Integration Tests
        working-directory: ATC_Support_Backend
        run: npm test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ATC_Support_Frontend/package-lock.json

      - name: Install
        working-directory: ATC_Support_Frontend
        run: npm ci

      - name: Lint
        working-directory: ATC_Support_Frontend
        run: npm run lint

      - name: Build
        working-directory: ATC_Support_Frontend
        run: npm run build

